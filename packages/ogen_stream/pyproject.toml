[project]
name = "ogen-stream"
version = "0.1.0"
description = "Ontology-grounded generative UI engine: turns natural-language requests into validated JSON UI specs by reasoning over an RDF knowledge graph."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "jsonschema>=4.26.0",
    "numpy>=2.4.0",
    "openai>=2.14.0",
    "pydantic>=2",
    "pyoxigraph>=0.5.3",
    "scikit-learn>=1.8.0",
    "sentence-transformers>=5.2.0",
]

[project.optional-dependencies]
langchain = ["langchain-core"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ogen_stream"]
artifacts = ["src/ogen_stream/ogen-core.ttl"]
